<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LinguaLayer Options</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 450px;
      margin: 20px auto;
      padding: 16px;
      background: #fafafa;
      color: #333;
    }
    h1 { font-size: 18px; margin-bottom: 20px; }
    p { font-size: 13px; color: #666; }
    select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button { background: #111; color: #fff; cursor: pointer; border: none; font-weight: 600;}
  </style>
</head>
<body>
  <h1>LinguaLayer Options Configuration</h1>
  <p>Select your native preferred language. Overlay elements will automatically assume this as source preference.</p>
  
  <select id="userLang">
    <option value="English">English</option>
    <option value="Chinese">Chinese</option>
    <option value="Spanish">Spanish</option>
    <option value="French">French</option>
    <option value="Arabic">Arabic</option>
    <option value="Swahili">Swahili</option>
  </select>

  <button id="saveButton">Save Default Lang</button>
  <script src="options.js"></script>
</body>
</html>
