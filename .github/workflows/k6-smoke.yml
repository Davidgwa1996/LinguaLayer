name: K6 Smoke Test

on: [push, pull_request]

jobs:
  k6_smoke:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run k6 smoke test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: performance/smoke-test.js
      env:
        BASE_URL: ${{ secrets.STAGING_URL }}
